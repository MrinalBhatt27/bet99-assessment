name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Build & unit-test on every supported JDK ─────────────────────────────────
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false       # run both matrix entries even if one fails
      matrix:
        java: [ '8', '21' ]  # 8  = stated minimum requirement
                             # 21 = what the Docker image uses

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn package -DskipTests --no-transfer-progress

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: target/surefire-reports/

      - name: Upload WAR artifact
        if: matrix.java == '21'   # only upload once, from the canonical build
        uses: actions/upload-artifact@v4
        with:
          name: bug-tracker-war
          path: target/*.war

  # ── Verify the Docker image builds successfully ───────────────────────────────
  # Runs only after all build-and-test matrix jobs pass, so a failing test
  # prevents a broken image from being reported as the only failure.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . --tag bet99-app:ci --no-cache
