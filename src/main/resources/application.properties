# DB config (can be overridden with env vars)
db.host=${DB_HOST:localhost}
db.port=${DB_PORT:3306}
db.name=${MYSQL_DATABASE:bet99}
db.username=${MYSQL_USER:bet99_user}
db.password=${MYSQL_PASSWORD:bet99_pass}

db.url=jdbc:mysql://${db.host}:${db.port}/${db.name}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&zeroDateTimeBehavior=convertToNull

hibernate.show_sql=false
hibernate.format_sql=false
hibernate.hbm2ddl.auto=update

# API base URL used by JSP for AJAX calls (supports client/server split)
api.baseUrl=${API_BASE_URL:}

